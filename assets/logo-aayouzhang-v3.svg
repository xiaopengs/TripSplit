<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34C759"/>
      <stop offset="100%" stop-color="#248A3D"/>
    </linearGradient>
  </defs>
  <!-- 绿色渐变圆角背景 -->
  <rect width="1024" height="1024" rx="220" fill="url(#bg)"/>

  <!-- AA 文字（居中偏上） -->
  <text x="512" y="430" text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif"
        font-size="300" font-weight="800" fill="#fff" letter-spacing="50">AA</text>

  <!-- AA 下方装饰线 -->
  <rect x="376" y="458" width="273" height="17" rx="8" fill="rgba(255,255,255,0.35)"/>

  <!-- 左侧朋友：头（圆）在上，肩膀（圆顶方底）在下 -->
  <circle cx="384" cy="570" r="68" fill="#fff"/>
  <path d="M299,757 L299,706 A85,51 0 0 1 470,706 L470,757 Z" fill="#fff"/>

  <!-- 右侧朋友：头（圆）在上，肩膀（圆顶方底）在下 -->
  <circle cx="640" cy="570" r="68" fill="#fff"/>
  <path d="M555,757 L555,706 A85,51 0 0 1 726,706 L726,757 Z" fill="#fff"/>
</svg>
